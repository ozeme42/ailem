# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

# Specifies the location of your source code.
fetch:
  # Specifies that the source code is in the current directory.
  path: .
# Specifies the commands to build your app.
build:
  # Specifies the command to install dependencies.
  run: npm install
  # Specifies the command to build your app.
  run: npm run build
# Specifies the command to run your app.
run: npm run start

runConfig:
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  maxInstances: 1
